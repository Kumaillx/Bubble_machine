; PlatformIO Project Configuration File
;
;   Bubble Machine – ESP32 + Relay + Bluetooth Serial
;   https://docs.platformio.org/page/projectconf.html

[env:esp32doit-devkit-v1]
platform  = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board     = esp32doit-devkit-v1
framework = arduino

; ── Bluetooth requires a larger partition scheme ──────────────
board_build.partitions = default.csv

; ── Build flags ──────────────────────────────────────────────
; Note: BT/Bluedroid flags are already defined in the framework's
; sdkconfig.h – do NOT redefine them here or you'll get warnings.
build_flags =
    -DCORE_DEBUG_LEVEL=0

; ── Serial monitor ────────────────────────────────────────────
monitor_speed = 115200
